# ------------------------------------------------------------------
# GitHub Actions — CI quality gate
#   • Runs the pytest suite on every push / PR
#   • Windows runner: matches the app's real target platform and avoids
#     headless-Qt system-library setup needed on Linux
# ------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "VERSION"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q
